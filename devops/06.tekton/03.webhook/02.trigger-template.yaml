apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: sk000-springboot-trigger-template
  namespace: skala-tekton
spec:
  params:
    - name: git-url
      description: Git repository URL
    - name: git-revision
      description: Git branch/revision to checkout
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: sk000-ci-pipeline-run-
      spec:
        serviceAccountName: sk000-pipeline-sa
        pipelineRef:
          name: ci-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-registry-url
            value: "amdp-registry.skala-ai.com"
          - name: image-registry-project
            value: "skala25a"
          - name: image-name
            value: sk000-myfirst-api-server
          - name: image-tag
            value: 1.0.0
          - name: dockerfile
            value: "Dockerfile"
          - name: context
            value: "."
          - name: k8s-deploy-path
            value: "k8s/deploy.yaml"
          - name: skip-tls-verify-registry
            value: "false"
          - name: git-user-name
            value: himang10
          - name: git-user-email
            value: "skala@skala-ai.com"
        workspaces:
          - name: shared-workspace # 소스코드, 빌드산출물
            persistentVolumeClaim:
              claimName: sk000-shared-workspace-pvc
          - name: maven-settings # settings.xml
            persistentVolumeClaim:
              claimName: sk000-shared-workspace-pvc
          - name: maven-local-repo # m2 repository
            persistentVolumeClaim:
              claimName: sk000-shared-workspace-pvc
        podTemplate:
          securityContext:
            fsGroup: 0
            runAsUser: 0
            runAsGroup: 0
